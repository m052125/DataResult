
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);font-size:16px;color:var(--color-text-primary)}
.app{padding:.75rem 0 2rem}

input,select{font-size:16px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:10px;width:100%}
input:focus,select:focus{outline:none;border-color:#378ADD;background:var(--color-background-primary)}
input[type=text],input[type=number],select{padding:13px 12px;height:50px}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card-head{padding:11px 14px;font-size:12px;font-weight:500;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.card-body{padding:12px 14px}

.blue-h{background:#E6F1FB;color:#0C447C}.blue-d{background:#378ADD}
.teal-h{background:#E1F5EE;color:#085041}.teal-d{background:#1D9E75}
.amber-h{background:#FAEEDA;color:#633806}.amber-d{background:#BA7517}
.purple-h{background:#EEEDFE;color:#3C3489}.purple-d{background:#7F77DD}
.coral-h{background:#FAECE7;color:#4A1B0C}.coral-d{background:#D85A30}
.green-h{background:#EAF3DE;color:#173404}.green-d{background:#639922}
.gray-h{background:#F1EFE8;color:#2C2C2A}.gray-d{background:#888780}

.fl{font-size:13px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500}
.fg{margin-bottom:12px}
.fg:last-child{margin-bottom:0}

.score-row{display:flex;align-items:center;gap:10px}
.score-row input{text-align:center;font-size:20px;font-weight:500;flex:1}
.sdash{font-size:22px;color:var(--color-text-tertiary);flex-shrink:0}

.tabs{display:flex;gap:5px;margin-bottom:12px;background:var(--color-background-secondary);padding:5px;border-radius:14px}
.tab{flex:1;height:46px;border:none;border-radius:10px;background:transparent;color:var(--color-text-secondary);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.tab.on{background:var(--color-background-primary);color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.qpanel{display:none}.qpanel.on{display:block}

.stat-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:0.5px solid var(--color-border-tertiary)}
.stat-row:first-child{border-top:none;padding-top:0}
.stat-lbl{font-size:13px;color:var(--color-text-secondary);min-width:80px;flex-shrink:0}
.nin{width:64px!important;text-align:center;flex-shrink:0;padding:10px 4px!important;height:46px!important}
.fsep{font-size:16px;color:var(--color-text-tertiary);flex-shrink:0}
.pct{font-size:15px;font-weight:500;min-width:52px;text-align:right;flex-shrink:0}
.blue-p{color:#185FA5}.teal-p{color:#0F6E56}.amber-p{color:#854F0B}
.purple-p{color:#534AB7}.coral-p{color:#993C1D}.green-p{color:#3B6D11}.gray-p{color:#5F5E5A}

.g-badge{background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;flex-shrink:0}

.prow{padding:10px 0;border-top:0.5px solid var(--color-border-tertiary)}
.prow:first-child{border-top:none;padding-top:0}
.prow-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prow-top input.pname{flex:1;height:44px;padding:10px 12px}
.del-btn{width:40px;height:40px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn:active{background:#FAECE7;color:#D85A30;border-color:#D85A30}
.prow-nums{display:flex;align-items:center;gap:8px}
.prow-nums .nin{width:60px!important}
.ast-wrap{display:flex;align-items:center;gap:6px;margin-left:4px;background:var(--color-background-secondary);border-radius:10px;padding:4px 8px}
.ast-wrap input{width:52px!important;height:38px!important;padding:6px 4px!important;text-align:center;background:transparent;border:none}
.ast-wrap input:focus{background:transparent}
.ast-lbl{font-size:12px;color:var(--color-text-tertiary);white-space:nowrap}

.add-btn{width:100%;height:50px;margin-top:10px;border:1.5px dashed var(--color-border-secondary);border-radius:12px;background:transparent;font-size:15px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:active{background:var(--color-background-secondary)}

.time-row{display:flex;align-items:center;gap:8px}
.time-row input{width:72px!important;text-align:center;height:50px!important;font-size:18px!important;font-weight:500}
.tcol{font-size:20px;font-weight:500;color:var(--color-text-secondary);flex-shrink:0}

.hr{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:0}

.gen-btn{width:100%;height:56px;margin-top:1rem;border:none;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--font-sans);background:#185FA5;color:#fff;letter-spacing:.02em}
.gen-btn:active{opacity:.85}

.out-wrap{margin-top:12px;display:none}
.out-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:var(--color-text-primary);font-family:var(--font-mono);max-height:320px;overflow-y:auto}
.copy-btn{width:100%;height:52px;margin-top:8px;border:0.5px solid var(--color-border-secondary);border-radius:12px;background:transparent;color:var(--color-text-secondary);font-size:15px;cursor:pointer;font-family:var(--font-sans)}
.copy-btn:active{background:var(--color-background-secondary)}
.copy-btn.ok{color:#0F6E56;border-color:#1D9E75;background:#E1F5EE}
</style>

<div class="app">
<h2 class="sr-only">ラクロス試合速報フォーム（スマホ対応）</h2>

<div class="card">
  <div class="card-head" style="background:#E6F1FB;color:#0C447C"><span class="dot blue-d"></span>試合情報</div>
  <div class="card-body">
    <div class="fg">
      <div class="fl">試合種別</div>
      <select id="match-type" onchange="onType()">
        <option value="練習試合">練習試合</option>
        <option value="league">リーグ戦</option>
      </select>
    </div>
    <div class="fg" id="lnum-wrap" style="display:none">
      <div class="fl">第◯戦</div>
      <input type="number" id="lnum" inputmode="numeric" min="1" placeholder="例：3">
    </div>
    <div class="fg">
      <div class="fl">対戦相手</div>
      <input type="text" id="opponent" placeholder="◯◯大学">
    </div>
    <div class="fg" style="margin-bottom:0">
      <div class="fl">トータルスコア（自 − 相手）</div>
      <div class="score-row">
        <input type="number" id="ts-a" inputmode="numeric" min="0" placeholder="0">
        <span class="sdash">−</span>
        <input type="number" id="ts-b" inputmode="numeric" min="0" placeholder="0">
      </div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchQ(0)">1Q</button>
  <button class="tab" onclick="switchQ(1)">2Q</button>
  <button class="tab" onclick="switchQ(2)">3Q</button>
  <button class="tab" onclick="switchQ(3)">4Q</button>
</div>

<div id="panels"></div>

<button class="gen-btn" onclick="generate()">速報テキストを生成</button>
<div class="out-wrap" id="out-wrap">
  <div class="out-box" id="out-box"></div>
  <button class="copy-btn" id="copy-btn" onclick="copyOut()">クリップボードにコピー</button>
</div>
</div>

<script>
function onType(){
  document.getElementById('lnum-wrap').style.display=
    document.getElementById('match-type').value==='league'?'block':'none';
}

let ctr={};
function uid(base){if(!ctr[base])ctr[base]=0;return ctr[base]++;}

function pctCalc(a,b){
  const an=parseFloat(a)||0,bn=parseFloat(b)||0;
  return bn===0?null:Math.round(an/bn*100);
}
function updPct(aId,bId,pId,cls){
  const a=document.getElementById(aId)?.value,b=document.getElementById(bId)?.value;
  const el=document.getElementById(pId);
  if(!el)return;
  const p=pctCalc(a,b);
  el.textContent=p===null?'—':p+'%';
}

function fracStat(q,key,label,pClass){
  const aId=`${q}-${key}-a`,bId=`${q}-${key}-b`,pId=`${q}-${key}-p`;
  return `<div class="stat-row">
    <span class="stat-lbl">${label}</span>
    <input class="nin" type="number" id="${aId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
    <span class="fsep">/</span>
    <input class="nin" type="number" id="${bId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
    <span class="fsep">=</span>
    <span class="pct ${pClass}" id="${pId}">—</span>
  </div>`;
}

function addPlayer(qi,key,hasAst){
  const base=`q${qi}-${key}`;
  const idx=uid(base);
  const nId=`${base}-n${idx}`,aId=`${base}-a${idx}`,bId=`${base}-b${idx}`,pId=`${base}-p${idx}`;
  const astHtml=hasAst?`<div class="ast-wrap">
    <input type="number" id="${base}-ast${idx}" inputmode="numeric" min="0" placeholder="0">
    <span class="ast-lbl">本</span>
  </div>`:'';
  const div=document.createElement('div');
  div.className='prow';div.id=`${base}-row${idx}`;
  div.innerHTML=`
    <div class="prow-top">
      <input type="text" class="pname" id="${nId}" placeholder="名前を入力">
      <button class="del-btn" onclick="this.closest('.prow').remove()">×</button>
    </div>
    <div class="prow-nums">
      <input class="nin" type="number" id="${aId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="fsep">/</span>
      <input class="nin" type="number" id="${bId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="fsep">=</span>
      <span class="pct purple-p" id="${pId}">—</span>
      ${astHtml}
    </div>`;
  return div;
}

function addTo(qi,key,hasAst){
  const c=document.getElementById(`q${qi}-${key}-rows`);
  if(c)c.appendChild(addPlayer(qi,key,hasAst));
}

function buildPanel(qi){
  const q=`q${qi}`;
  const div=document.createElement('div');
  div.className='qpanel'+(qi===0?' on':'');
  div.id=`panel${qi}`;
  div.innerHTML=
  `<div class="card">
    <div class="card-head blue-h"><span class="dot blue-d"></span>クォータースコア</div>
    <div class="card-body">
      <div class="score-row">
        <input type="number" id="${q}-qs-a" inputmode="numeric" min="0" placeholder="自">
        <span class="sdash">−</span>
        <input type="number" id="${q}-qs-b" inputmode="numeric" min="0" placeholder="相手">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head blue-h"><span class="dot blue-d"></span>チーム成績</div>
    <div class="card-body">
      ${fracStat(q,'shot','ショット率','blue-p')}
      ${fracStat(q,'at','ATセーブ率','blue-p')}
      ${fracStat(q,'fs','フリシュー','blue-p')}
    </div>
  </div>

  <div class="card">
    <div class="card-head teal-h"><span class="dot teal-d"></span>Gセーブ率</div>
    <div class="card-body">
      <div class="fg">
        <div class="fl">出場ゴーリー</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="g-badge">G</span>
          <input type="text" id="${q}-gname" placeholder="名前" style="flex:1">
        </div>
      </div>
      <hr class="hr" style="margin-bottom:10px">
      <div class="stat-row" style="border-top:none;padding-top:0">
        <span class="stat-lbl">セーブ率</span>
        <input class="nin" type="number" id="${q}-g-a" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${q}-g-a','${q}-g-b','${q}-g-p')">
        <span class="fsep">/</span>
        <input class="nin" type="number" id="${q}-g-b" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${q}-g-a','${q}-g-b','${q}-g-p')">
        <span class="fsep">=</span>
        <span class="pct teal-p" id="${q}-g-p">—</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head amber-h"><span class="dot amber-d"></span>GBゲット率</div>
    <div class="card-body">
      ${fracStat(q,'gb','全体','amber-p')}
      ${fracStat(q,'gb2','自陣','amber-p')}
    </div>
  </div>

  <div class="card">
    <div class="card-head purple-h"><span class="dot purple-d"></span>個人ショット率</div>
    <div class="card-body">
      <div id="${q}-ps-rows"></div>
      <button class="add-btn" onclick="addTo(${qi},'ps',true)">＋ 選手を追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head coral-h"><span class="dot coral-d"></span>個人フリシュー決定率</div>
    <div class="card-body">
      <div id="${q}-pf-rows"></div>
      <button class="add-btn" onclick="addTo(${qi},'pf',false)">＋ 選手を追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head green-h"><span class="dot green-d"></span>ドローゲット率</div>
    <div class="card-body">
      <div id="${q}-dr-rows"></div>
      <button class="add-btn" onclick="addTo(${qi},'dr',false)">＋ 選手を追加</button>
      <hr class="hr" style="margin:10px 0">
      ${fracStat(q,'dr2','全体','green-p')}
    </div>
  </div>

  <div class="card">
    <div class="card-head gray-h"><span class="dot gray-d"></span>OFポゼ</div>
    <div class="card-body">
      <div class="fg">
        <div class="fl">平均時間（ショットまで）</div>
        <div class="time-row">
          <input type="number" id="${q}-avg-m" inputmode="numeric" min="0" placeholder="0">
          <span class="tcol">:</span>
          <input type="number" id="${q}-avg-s" inputmode="numeric" min="0" max="59" placeholder="00">
        </div>
      </div>
      <div class="fg" style="margin-bottom:0">
        <div class="fl">合計時間</div>
        <div class="time-row">
          <input type="number" id="${q}-tot-m" inputmode="numeric" min="0" placeholder="0">
          <span class="tcol">:</span>
          <input type="number" id="${q}-tot-s" inputmode="numeric" min="0" max="59" placeholder="00">
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('panels').appendChild(div);
  addTo(qi,'ps',true);
  addTo(qi,'pf',false);
  addTo(qi,'dr',false);
}

[0,1,2,3].forEach(buildPanel);

function switchQ(idx){
  document.querySelectorAll('.qpanel').forEach((p,i)=>p.classList.toggle('on',i===idx));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.getElementById(`panel${idx}`).scrollIntoView({behavior:'smooth',block:'start'});
}

function gv(id){return document.getElementById(id)?.value||''}
function nv(id){return gv(id)||'0'}
function tf(m,s){return `${gv(m)||'0'}:${String(gv(s)||'0').padStart(2,'0')}`}

function fracOut(q,key){
  const a=nv(`${q}-${key}-a`),b=nv(`${q}-${key}-b`);
  if(parseFloat(a)===0&&parseFloat(b)===0)return '-/ -= -%';
  const p=pctCalc(a,b);
  return `${a}/ ${b}= ${p===null?'—%':p+'%'}`;
}

function collectPlayers(qi,key,hasAst){
  const base=`q${qi}-${key}`;
  return Array.from(document.querySelectorAll(`[id^="${base}-row"]`)).map(row=>{
    const idx=row.id.replace(`${base}-row`,'');
    const nm=gv(`${base}-n${idx}`)||'名前';
    const a=nv(`${base}-a${idx}`),b=nv(`${base}-b${idx}`);
    const p=pctCalc(a,b);
    const pStr=p===null?'—%':p+'%';
    if(hasAst){const ast=nv(`${base}-ast${idx}`);return `${nm}　${a}/${b} = ${pStr}（アシスト ${ast} 本）`;}
    return `${nm}　${a}/ ${b}= ${pStr}`;
  }).join('\n');
}

function qOut(qi){
  const q=`q${qi}`,lb=['1Q','2Q','3Q','4Q'];
  const qa=nv(`${q}-qs-a`),qb=nv(`${q}-qs-b`);
  const gname=gv(`${q}-gname`)||'G名前';
  const ga=nv(`${q}-g-a`),gb=nv(`${q}-g-b`);
  const gp=pctCalc(ga,gb);
  const gpStr=(parseFloat(ga)===0&&parseFloat(gb)===0)?'-/ -= -%':`${ga}/ ${gb}= ${gp===null?'—%':gp+'%'}`;
  return `［${lb[qi]}］ ${qa}-${qb}
・ゴーリー：${gname}
・ショット率　 ${fracOut(q,'shot')}
・ATセーブ率　 ${fracOut(q,'at')}
・フリシュー決定率　 ${fracOut(q,'fs')}
・Gセーブ率
${gname}　 ${gpStr}
・GBゲット率
　 ${fracOut(q,'gb')}
自陣　 ${fracOut(q,'gb2')}
・個人ショット率
${collectPlayers(qi,'ps',true)}
・個人フリシュー決定率
${collectPlayers(qi,'pf',false)}
・ドローゲット率
${collectPlayers(qi,'dr',false)}
全体　 ${fracOut(q,'dr2')}
・OFポゼ
ショットが決まるまでの平均時間　${tf(`${q}-avg-m`,`${q}-avg-s`)}
合計時間　 ${tf(`${q}-tot-m`,`${q}-tot-s`)}`;
}

function generate(){
  const type=document.getElementById('match-type').value;
  const tl=type==='league'?`リーグ第${gv('lnum')||'◯'}戦`:'練習試合';
  const opp=gv('opponent')||'◯◯大学';
  const txt=`お疲れさまです。
本日の【${tl}】vs${opp}の試合データです。
データシート原本は後ほどドライブとslackにあげます。
よろしくお願いします。
スコア
${nv('ts-a')}-${nv('ts-b')}

${[0,1,2,3].map(qOut).join('\n\n')}`;
  document.getElementById('out-box').textContent=txt;
  const w=document.getElementById('out-wrap');
  w.style.display='block';
  setTimeout(()=>w.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out-box').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='コピーしました ✓';b.classList.add('ok');
    setTimeout(()=>{b.textContent='クリップボードにコピー';b.classList.remove('ok');},2200);
  });
}
</script>
