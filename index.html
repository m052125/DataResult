
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.app{padding:1.25rem 0}
.top-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.field-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field-row.three{grid-template-columns:1fr 1fr 1fr}
.field-row.full{grid-template-columns:1fr}
input[type=text],input[type=number],select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans);font-size:14px}
input:focus{outline:2px solid var(--color-border-info);outline-offset:1px;background:var(--color-background-primary)}
.score-inputs{display:flex;align-items:center;gap:8px}
.score-inputs input{text-align:center;font-size:16px;font-weight:500;width:60px}
.score-sep{font-size:18px;color:var(--color-text-tertiary);flex-shrink:0}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{flex:1;padding:9px 0;text-align:center;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.12s}
.tab.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.qpanel{display:none}
.qpanel.on{display:block}
.stat-block{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;overflow:hidden}
.stat-head{padding:9px 14px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.03em}
.stat-body{padding:10px 14px}
.frac-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.frac-row .lbl{font-size:13px;color:var(--color-text-primary);min-width:72px}
.frac-row input{width:52px;text-align:center;padding:6px 4px}
.frac-sep{color:var(--color-text-tertiary);font-size:13px;flex-shrink:0}
.frac-eq{color:var(--color-text-tertiary);font-size:13px;flex-shrink:0}
.pct-badge{min-width:52px;font-size:13px;font-weight:500;color:var(--color-text-info);text-align:right}
.player-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-top:0.5px solid var(--color-border-tertiary)}
.player-row:first-child{border-top:none}
.player-name{flex:1;min-width:0}
.del-btn{width:24px;height:24px;border:none;background:none;color:var(--color-text-tertiary);cursor:pointer;font-size:16px;line-height:1;padding:0;flex-shrink:0;border-radius:4px;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:var(--color-background-danger);color:var(--color-text-danger)}
.add-btn{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;color:var(--color-text-secondary);font-size:12px;cursor:pointer;width:100%;justify-content:center;font-family:var(--font-sans)}
.add-btn:hover{background:var(--color-background-secondary)}
.time-pair{display:flex;align-items:center;gap:6px}
.time-pair input{width:52px;text-align:center}
.time-colon{color:var(--color-text-secondary);font-size:15px;font-weight:500}
.time-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.time-block{margin-bottom:8px}
.ast-wrap{display:flex;align-items:center;gap:4px;margin-left:4px}
.ast-wrap input{width:40px}
.ast-lbl{font-size:11px;color:var(--color-text-tertiary)}
.gen-btn{width:100%;padding:12px;border:none;border-radius:var(--border-radius-lg);background:var(--color-background-info);color:var(--color-text-info);font-size:14px;font-weight:500;cursor:pointer;margin-top:1rem;font-family:var(--font-sans);letter-spacing:0.02em}
.gen-btn:hover{opacity:0.88}
.out-wrap{margin-top:1rem;display:none}
.out-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;font-size:12.5px;line-height:1.75;white-space:pre-wrap;color:var(--color-text-primary);font-family:var(--font-mono);max-height:360px;overflow-y:auto}
.copy-btn{width:100%;margin-top:8px;padding:9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.copy-btn:hover{background:var(--color-background-secondary)}
.copy-btn.ok{color:var(--color-text-success);border-color:var(--color-border-success)}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:6px 0}
</style>

<div class="app">
<h2 class="sr-only">ラクロス試合速報フォーム</h2>

<div class="top-section">
  <div class="field-row">
    <div>
      <div class="field-label">試合種別</div>
      <select id="match-type" onchange="onTypeChange()">
        <option value="練習試合">練習試合</option>
        <option value="league">リーグ戦（第◯戦）</option>
      </select>
    </div>
    <div id="league-num-field" style="display:none">
      <div class="field-label">第◯戦</div>
      <input type="number" id="league-num" min="1" placeholder="例：3">
    </div>
  </div>
  <div class="field-row full" style="margin-bottom:10px">
    <div>
      <div class="field-label">対戦相手</div>
      <input type="text" id="opponent" placeholder="◯◯大学">
    </div>
  </div>
  <div>
    <div class="field-label">トータルスコア（自チーム − 相手）</div>
    <div class="score-inputs">
      <input type="number" id="ts-own" min="0" placeholder="0">
      <span class="score-sep">−</span>
      <input type="number" id="ts-opp" min="0" placeholder="0">
    </div>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" onclick="switchQ(0)">1Q</button>
  <button class="tab" onclick="switchQ(1)">2Q</button>
  <button class="tab" onclick="switchQ(2)">3Q</button>
  <button class="tab" onclick="switchQ(3)">4Q</button>
</div>

<div id="panels"></div>

<button class="gen-btn" onclick="generate()">速報テキストを生成</button>
<div class="out-wrap" id="out-wrap">
  <div class="out-box" id="out-box"></div>
  <button class="copy-btn" id="copy-btn" onclick="copyOut()">クリップボードにコピー</button>
</div>
</div>

<script>
function onTypeChange(){
  const v=document.getElementById('match-type').value;
  document.getElementById('league-num-field').style.display=v==='league'?'block':'none';
}

function calcPct(a,b){
  const an=parseFloat(a)||0,bn=parseFloat(b)||0;
  if(bn===0)return null;
  return Math.round(an/bn*100);
}
function pctTxt(a,b){
  const p=calcPct(a,b);
  return p===null?'—':p+'%';
}
function pctBadge(aId,bId,outId){
  const a=document.getElementById(aId)?.value,b=document.getElementById(bId)?.value;
  const el=document.getElementById(outId);
  if(el) el.textContent=pctTxt(a,b);
}

function makeFracRow(qi,key,label,calcAst){
  const aId=`${qi}-${key}-a`,bId=`${qi}-${key}-b`,pId=`${qi}-${key}-p`;
  const astPart=calcAst?`<div class="ast-wrap"><input type="number" id="${qi}-${key}-ast" min="0" placeholder="0"><span class="ast-lbl">本</span></div>`:'';
  return `<div class="frac-row">
    ${label?`<span class="lbl">${label}</span>`:''}
    <input type="number" id="${aId}" min="0" placeholder="0" oninput="pctBadge('${aId}','${bId}','${pId}')">
    <span class="frac-sep">/</span>
    <input type="number" id="${bId}" min="0" placeholder="0" oninput="pctBadge('${aId}','${bId}','${pId}')">
    <span class="frac-eq">=</span>
    <span class="pct-badge" id="${pId}">—</span>
    ${astPart}
  </div>`;
}

let playerCounters={};
function addPlayerRow(qi,key,container){
  const k=`${qi}-${key}`;
  if(!playerCounters[k]) playerCounters[k]=0;
  const idx=playerCounters[k]++;
  const nId=`${k}-n${idx}`,aId=`${k}-a${idx}`,bId=`${k}-b${idx}`,pId=`${k}-p${idx}`;
  const astPart=key==='ps'?`<div class="ast-wrap"><input type="number" id="${k}-ast${idx}" min="0" placeholder="0" style="width:40px"><span class="ast-lbl">本</span></div>`:'';
  const div=document.createElement('div');
  div.className='player-row';
  div.id=`${k}-row${idx}`;
  div.innerHTML=`
    <input type="text" class="player-name" id="${nId}" placeholder="名前">
    <input type="number" style="width:52px;text-align:center;padding:6px 4px" id="${aId}" min="0" placeholder="0" oninput="pctBadge('${aId}','${bId}','${pId}')">
    <span class="frac-sep">/</span>
    <input type="number" style="width:52px;text-align:center;padding:6px 4px" id="${bId}" min="0" placeholder="0" oninput="pctBadge('${aId}','${bId}','${pId}')">
    <span class="frac-eq">=</span>
    <span class="pct-badge" id="${pId}">—</span>
    ${astPart}
    <button class="del-btn" onclick="this.closest('.player-row').remove()" title="削除">×</button>`;
  container.appendChild(div);
}

function makeQPanel(qi){
  const div=document.createElement('div');
  div.className='qpanel'+(qi===0?' on':'');
  div.id=`panel${qi}`;
  div.innerHTML=`
<div class="stat-block">
  <div class="stat-head">クォータースコア（自チーム − 相手）</div>
  <div class="stat-body">
    <div class="score-inputs">
      <input type="number" id="q${qi}-qs-a" min="0" placeholder="0">
      <span class="score-sep">−</span>
      <input type="number" id="q${qi}-qs-b" min="0" placeholder="0">
    </div>
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">チーム成績</div>
  <div class="stat-body">
    ${makeFracRow(`q${qi}`,'shot','ショット率')}
    <hr class="divider">
    ${makeFracRow(`q${qi}`,'at','ATセーブ率')}
    <hr class="divider">
    ${makeFracRow(`q${qi}`,'fs','フリシュー決定率')}
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">Gセーブ率</div>
  <div class="stat-body">
    <div class="frac-row">
      <input type="text" id="q${qi}-gname" placeholder="G名前" style="flex:1;max-width:110px">
      <input type="number" id="q${qi}-g-a" min="0" placeholder="0" style="width:52px;text-align:center;padding:6px 4px" oninput="pctBadge('q${qi}-g-a','q${qi}-g-b','q${qi}-g-p')">
      <span class="frac-sep">/</span>
      <input type="number" id="q${qi}-g-b" min="0" placeholder="0" style="width:52px;text-align:center;padding:6px 4px" oninput="pctBadge('q${qi}-g-a','q${qi}-g-b','q${qi}-g-p')">
      <span class="frac-eq">=</span>
      <span class="pct-badge" id="q${qi}-g-p">—</span>
    </div>
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">GBゲット率</div>
  <div class="stat-body">
    ${makeFracRow(`q${qi}`,'gb','全体')}
    <hr class="divider">
    ${makeFracRow(`q${qi}`,'gb2','自陣')}
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">個人ショット率</div>
  <div class="stat-body">
    <div id="q${qi}-ps-rows"></div>
    <button class="add-btn" onclick="addPlayerRow(${qi},'ps',document.getElementById('q${qi}-ps-rows'))">＋ 選手を追加</button>
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">ドローゲット率</div>
  <div class="stat-body">
    <div id="q${qi}-dr-rows"></div>
    <button class="add-btn" onclick="addPlayerRow(${qi},'dr',document.getElementById('q${qi}-dr-rows'))">＋ 選手を追加</button>
    <hr class="divider" style="margin-top:8px">
    ${makeFracRow(`q${qi}`,'dr2','全体')}
  </div>
</div>

<div class="stat-block">
  <div class="stat-head">OFポゼ</div>
  <div class="stat-body">
    <div class="time-block">
      <div class="time-label">ショットが決まるまでの平均時間</div>
      <div class="time-pair">
        <input type="number" id="q${qi}-avg-m" min="0" placeholder="0">
        <span class="time-colon">:</span>
        <input type="number" id="q${qi}-avg-s" min="0" max="59" placeholder="00">
      </div>
    </div>
    <div class="time-block">
      <div class="time-label">合計時間</div>
      <div class="time-pair">
        <input type="number" id="q${qi}-tot-m" min="0" placeholder="0">
        <span class="time-colon">:</span>
        <input type="number" id="q${qi}-tot-s" min="0" max="59" placeholder="00">
      </div>
    </div>
  </div>
</div>`;
  document.getElementById('panels').appendChild(div);
  // add initial player rows
  addPlayerRow(qi,'ps',div.querySelector(`#q${qi}-ps-rows`));
  addPlayerRow(qi,'dr',div.querySelector(`#q${qi}-dr-rows`));
}

[0,1,2,3].forEach(makeQPanel);

function switchQ(idx){
  document.querySelectorAll('.qpanel').forEach((p,i)=>p.classList.toggle('on',i===idx));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
}

function g(id){return document.getElementById(id)?.value||''}
function n(id){return g(id)||'0'}
function timeFmt(mId,sId){
  const m=g(mId)||'0',s=g(sId)||'00';
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fracLine(prefix,label,dash){
  const a=n(`${prefix}-a`),b=n(`${prefix}-b`);
  if(dash&&(a==='0'||b==='0')){
    const bothZero=parseFloat(a)===0&&parseFloat(b)===0;
    if(bothZero) return label?`${label}\t-/ -= -%`:`-/ -= -%`;
  }
  const p=calcPct(a,b);
  const pStr=p===null?'—':p+'%';
  return label?`${label}\t${a}/ ${b}= ${pStr}`:`${a}/ ${b}= ${pStr}`;
}

function getPlayerRows(qi,key){
  const rows=document.querySelectorAll(`[id^="q${qi}-${key}-row"]`);
  return Array.from(rows);
}

function qText(qi){
  const qa=n(`q${qi}-qs-a`),qb=n(`q${qi}-qs-b`);

  const shotLine=fracLine(`q${qi}-shot`,null,true);
  const atLine=fracLine(`q${qi}-at`,null,true);
  const fsLine=fracLine(`q${qi}-fs`,null,true);

  const gname=g(`q${qi}-gname`)||'G名前';
  const ga=n(`q${qi}-g-a`),gb2=n(`q${qi}-g-b`);
  const gp=calcPct(ga,gb2);
  const gpStr=(parseFloat(ga)===0&&parseFloat(gb2)===0)?'-/ -= -%':`${ga}/ ${gb2}= ${gp===null?'—':gp+'%'}`;

  const gbLine=fracLine(`q${qi}-gb`,null,true);
  const gb2Line=fracLine(`q${qi}-gb2`,null,true);

  // individual shots
  const psRows=getPlayerRows(qi,'ps');
  const k=`q${qi}-ps`;
  const psLines=[];
  let rowIdx=0;
  document.querySelectorAll(`[id^="${k}-row"]`).forEach(row=>{
    const idx=row.id.replace(`${k}-row`,'');
    const nm=g(`${k}-n${idx}`);
    const a=n(`${k}-a${idx}`),b=n(`${k}-b${idx}`),ast=n(`${k}-ast${idx}`);
    const p=calcPct(a,b);
    const pStr=p===null?'—':p+'%';
    psLines.push(`${nm||'名前'}\t${a}/${b} = ${pStr}（アシスト ${ast} 本）`);
  });

  // draw
  const dk=`q${qi}-dr`;
  const drLines=[];
  document.querySelectorAll(`[id^="${dk}-row"]`).forEach(row=>{
    const idx=row.id.replace(`${dk}-row`,'');
    const nm=g(`${dk}-n${idx}`);
    const a=n(`${dk}-a${idx}`),b=n(`${dk}-b${idx}`);
    const p=calcPct(a,b);
    const pStr=p===null?'—':p+'%';
    drLines.push(`${nm||'名前'}\t${a}/ ${b}= ${pStr}`);
  });
  const dr2Line=fracLine(`q${qi}-dr2`,null,true);

  const avgTime=timeFmt(`q${qi}-avg-m`,`q${qi}-avg-s`);
  const totTime=timeFmt(`q${qi}-tot-m`,`q${qi}-tot-s`);

  return `［${['1Q','2Q','3Q','4Q'][qi]}］ ${qa}-${qb}
・ショット率　 ${shotLine}
・ATセーブ率　 ${atLine}
・フリシュー決定率　 ${fsLine}
・Gセーブ率
${gname}　 ${gpStr}
・GBゲット率
　 ${gbLine}
自陣　 ${gb2Line}
・個人ショット率
${psLines.join('\n')}
・ドローゲット率
${drLines.join('\n')}
全体　 ${dr2Line}
・OFポゼ
ショットが決まるまでの平均時間　${avgTime}
合計時間　 ${totTime}`;
}

function generate(){
  const type=document.getElementById('match-type').value;
  let typeLabel=type==='league'?`リーグ第${g('league-num')||'◯'}戦`:'練習試合';
  const opp=g('opponent')||'◯◯大学';
  const own=n('ts-own'),opp2=n('ts-opp');
  const out=`お疲れさまです。
本日の【${typeLabel}】vs${opp}の試合データです。
データシート原本は後ほどドライブとslackにあげます。
よろしくお願いします。
スコア
${own}-${opp2}

${[0,1,2,3].map(qText).join('\n\n')}`;
  document.getElementById('out-box').textContent=out;
  const w=document.getElementById('out-wrap');
  w.style.display='block';
  setTimeout(()=>w.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out-box').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='コピーしました ✓';b.classList.add('ok');
    setTimeout(()=>{b.textContent='クリップボードにコピー';b.classList.remove('ok');},2000);
  });
}
</script>
