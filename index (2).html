
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);font-size:16px;color:var(--color-text-primary);background:var(--color-background-tertiary)}

.screen{min-height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
.qtabs{display:flex;gap:4px;background:var(--color-background-secondary);padding:4px;border-radius:12px}
.qtab{flex:1;height:40px;border:none;border-radius:9px;background:transparent;color:var(--color-text-secondary);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.qtab.on{background:var(--color-background-primary);color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* SCROLL AREA */
.content{flex:1;overflow-y:auto;padding:12px 12px 100px}

/* SECTIONS */
.section{background:var(--color-background-primary);border-radius:14px;margin-bottom:10px;overflow:hidden}
.section-head{padding:12px 14px;font-size:13px;font-weight:500;letter-spacing:.04em;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.section-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.section-body{padding:12px 14px}

.blue-h{background:#E6F1FB;color:#0C447C}.blue-d{background:#378ADD}.blue-p{color:#185FA5}
.teal-h{background:#E1F5EE;color:#085041}.teal-d{background:#1D9E75}.teal-p{color:#0F6E56}
.amber-h{background:#FAEEDA;color:#633806}.amber-d{background:#BA7517}.amber-p{color:#854F0B}
.purple-h{background:#EEEDFE;color:#3C3489}.purple-d{background:#7F77DD}.purple-p{color:#534AB7}
.coral-h{background:#FAECE7;color:#4A1B0C}.coral-d{background:#D85A30}.coral-p{color:#993C1D}
.green-h{background:#EAF3DE;color:#173404}.green-d{background:#639922}.green-p{color:#3B6D11}
.gray-h{background:#F1EFE8;color:#2C2C2A}.gray-d{background:#888780}.gray-p{color:#5F5E5A}

/* INPUTS */
input,select{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:16px;width:100%}
input:focus,select:focus{outline:none;border-color:#378ADD;background:var(--color-background-primary)}
input[type=text],select{height:50px;padding:0 12px}
input[type=number]{height:50px;padding:0 8px;text-align:center}

/* FIELD */
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field-label{font-size:13px;color:var(--color-text-secondary);font-weight:500;margin-bottom:6px}

/* SCORE */
.score-row{display:flex;align-items:center;gap:10px}
.score-row input{flex:1;font-size:22px;font-weight:500;height:56px}
.score-dash{font-size:24px;color:var(--color-text-tertiary);flex-shrink:0;font-weight:300}

/* STAT ROWS (team) */
.stat-line{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:0.5px solid var(--color-border-tertiary)}
.stat-line:first-child{border-top:none;padding-top:0}
.stat-name{font-size:13px;color:var(--color-text-secondary);flex:1;min-width:0}
.stat-frac{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nin{width:58px!important;height:48px!important;font-size:16px!important}
.sep{font-size:16px;color:var(--color-text-tertiary)}
.pct-badge{font-size:15px;font-weight:500;min-width:52px;text-align:right}

/* PLAYER CARDS */
.empty-hint{text-align:center;padding:18px 0;font-size:14px;color:var(--color-text-tertiary)}

.pcard{background:var(--color-background-secondary);border-radius:12px;padding:12px;margin-bottom:8px;position:relative}
.pcard:last-child{margin-bottom:0}
.pcard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pcard-top input[type=text]{flex:1;height:48px}
.del-btn{width:44px;height:44px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.del-btn:active{background:#FAECE7;color:#D85A30;border-color:#D85A30}
.pcard-frac{display:flex;align-items:center;gap:8px}
.pcard-frac input{width:64px!important;height:52px!important;font-size:18px!important;font-weight:500}
.ast-chip{display:flex;align-items:center;gap:5px;background:var(--color-background-primary);border-radius:9px;padding:5px 10px;margin-left:4px;border:0.5px solid var(--color-border-tertiary)}
.ast-chip input{width:52px!important;height:40px!important;font-size:16px!important;background:transparent;border:none;border-radius:0}
.ast-chip input:focus{border:none;background:transparent}
.ast-chip-lbl{font-size:13px;color:var(--color-text-tertiary)}

/* GOALIE CARD */
.g-badge{background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;padding:5px 10px;border-radius:8px;flex-shrink:0}
.gcard{background:var(--color-background-secondary);border-radius:12px;padding:12px;margin-bottom:8px}
.gcard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gcard-top input[type=text]{flex:1;height:48px}

/* ADD BUTTON */
.add-btn{width:100%;height:52px;margin-top:10px;border:1.5px dashed var(--color-border-secondary);border-radius:12px;background:transparent;font-size:15px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:active{background:var(--color-background-secondary)}

/* TIME */
.time-row{display:flex;align-items:center;gap:10px}
.time-row input{width:80px!important;height:54px!important;font-size:20px!important;font-weight:500}
.time-colon{font-size:22px;font-weight:400;color:var(--color-text-secondary)}

/* BOTTOM BAR */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:10px 12px calc(10px + env(safe-area-inset-bottom));z-index:100}
.gen-btn{width:100%;height:54px;border:none;border-radius:12px;background:#185FA5;color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.gen-btn:active{opacity:.85}

/* OUTPUT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:20px 20px 0 0;width:100%;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:80vh;display:flex;flex-direction:column}
.modal-handle{width:36px;height:4px;background:var(--color-border-secondary);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:12px}
.out-box{flex:1;overflow-y:auto;background:var(--color-background-secondary);border-radius:12px;padding:14px;font-size:13px;line-height:1.85;white-space:pre-wrap;font-family:var(--font-mono);color:var(--color-text-primary);min-height:0}
.copy-btn{width:100%;height:52px;margin-top:10px;border:none;border-radius:12px;background:#1D9E75;color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--font-sans);flex-shrink:0}
.copy-btn:active{opacity:.85}
.copy-btn.ok{background:#E1F5EE;color:#0F6E56}
.close-btn{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;background:var(--color-background-secondary);border-radius:50%;cursor:pointer;font-size:18px;color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center}

.qpanel{display:none}.qpanel.on{display:block}
.hr{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:4px 0}
</style>

<div class="screen">
<h2 class="sr-only">ラクロス試合速報入力フォーム</h2>

<div class="topbar">
  <div class="topbar-title">試合速報フォーム</div>
  <div class="qtabs">
    <button class="qtab on" onclick="switchQ(0)">情報</button>
    <button class="qtab" onclick="switchQ(1)">1Q</button>
    <button class="qtab" onclick="switchQ(2)">2Q</button>
    <button class="qtab" onclick="switchQ(3)">3Q</button>
    <button class="qtab" onclick="switchQ(4)">4Q</button>
  </div>
</div>

<div class="content" id="content">

<!-- PANEL 0: 試合情報 -->
<div class="qpanel on" id="panel0">
  <div class="section">
    <div class="section-head blue-h"><span class="section-dot blue-d"></span>試合情報</div>
    <div class="section-body">
      <div class="field">
        <div class="field-label">試合種別</div>
        <select id="match-type" onchange="onType()">
          <option value="練習試合">練習試合</option>
          <option value="league">リーグ戦</option>
        </select>
      </div>
      <div class="field" id="lnum-wrap" style="display:none">
        <div class="field-label">第◯戦</div>
        <input type="number" id="lnum" inputmode="numeric" min="1" placeholder="例：3">
      </div>
      <div class="field">
        <div class="field-label">対戦相手</div>
        <input type="text" id="opponent" placeholder="◯◯大学">
      </div>
      <div class="field">
        <div class="field-label">トータルスコア（自 − 相手）</div>
        <div class="score-row">
          <input type="number" id="ts-a" inputmode="numeric" min="0" placeholder="0">
          <span class="score-dash">−</span>
          <input type="number" id="ts-b" inputmode="numeric" min="0" placeholder="0">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PANELS 1-4: 1Q〜4Q -->
<div id="qpanels"></div>

</div><!-- /content -->

<div class="bottombar">
  <button class="gen-btn" onclick="generate()">速報テキストを生成</button>
</div>

<!-- OUTPUT MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <div class="modal-handle"></div>
    <button class="close-btn" onclick="closeModalDirect()">×</button>
    <div class="modal-title">生成されたテキスト</div>
    <div class="out-box" id="out-box"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyOut()">コピーする</button>
  </div>
</div>

</div>

<script>
function onType(){
  document.getElementById('lnum-wrap').style.display=
    document.getElementById('match-type').value==='league'?'block':'none';
}

function switchQ(idx){
  document.querySelectorAll('.qtab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.getElementById('panel0').style.display=idx===0?'block':'none';
  document.querySelectorAll('[id^="qpanel"]').forEach((p,i)=>p.classList.toggle('on',i+1===idx));
  document.getElementById('content').scrollTop=0;
}

let ctr={};
function uid(base){if(!ctr[base])ctr[base]=0;return ctr[base]++;}

function pc(a,b){const an=parseFloat(a)||0,bn=parseFloat(b)||0;return bn===0?null:Math.round(an/bn*100);}

function updPct(aId,bId,pId){
  const a=document.getElementById(aId)?.value,b=document.getElementById(bId)?.value,el=document.getElementById(pId);
  if(!el)return;
  const p=pc(a,b);el.textContent=p===null?'—':p+'%';
}

function statLine(q,key,label,pcls){
  const aId=`${q}-${key}-a`,bId=`${q}-${key}-b`,pId=`${q}-${key}-p`;
  return `<div class="stat-line">
    <span class="stat-name">${label}</span>
    <div class="stat-frac">
      <input class="nin" type="number" id="${aId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">/</span>
      <input class="nin" type="number" id="${bId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">=</span>
      <span class="pct-badge ${pcls}" id="${pId}">—</span>
    </div>
  </div>`;
}

function addGoalie(qi){
  const base=`q${qi}-g`;
  const idx=uid(base);
  const nId=`${base}-n${idx}`,aId=`${base}-a${idx}`,bId=`${base}-b${idx}`,pId=`${base}-p${idx}`;
  const div=document.createElement('div');
  div.className='gcard';div.id=`${base}-card${idx}`;
  div.innerHTML=`
    <div class="gcard-top">
      <span class="g-badge">G</span>
      <input type="text" id="${nId}" placeholder="ゴーリー名">
      <button class="del-btn" onclick="this.closest('.gcard').remove();checkEmpty('${qi}-g-rows','g')">×</button>
    </div>
    <div class="stat-frac">
      <input class="nin" style="width:64px!important;height:52px!important;font-size:18px!important;font-weight:500" type="number" id="${aId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">/</span>
      <input class="nin" style="width:64px!important;height:52px!important;font-size:18px!important;font-weight:500" type="number" id="${bId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">=</span>
      <span class="pct-badge teal-p" id="${pId}">—</span>
    </div>`;
  const rows=document.getElementById(`q${qi}-g-rows`);
  if(rows){
    const hint=rows.querySelector('.empty-hint');if(hint)hint.remove();
    rows.appendChild(div);
  }
}

function addPlayer(qi,key,hasAst){
  const base=`q${qi}-${key}`;
  const idx=uid(base);
  const nId=`${base}-n${idx}`,aId=`${base}-a${idx}`,bId=`${base}-b${idx}`,pId=`${base}-p${idx}`;
  const astHtml=hasAst?`<div class="ast-chip">
    <input type="number" id="${base}-ast${idx}" inputmode="numeric" min="0" placeholder="0">
    <span class="ast-chip-lbl">本</span>
  </div>`:'';
  const div=document.createElement('div');
  div.className='pcard';div.id=`${base}-card${idx}`;
  div.innerHTML=`
    <div class="pcard-top">
      <input type="text" id="${nId}" placeholder="名前を入力">
      <button class="del-btn" onclick="this.closest('.pcard').remove();checkEmpty('q${qi}-${key}-rows','${key}')">×</button>
    </div>
    <div class="pcard-frac">
      <input type="number" id="${aId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">/</span>
      <input type="number" id="${bId}" inputmode="numeric" min="0" placeholder="0" oninput="updPct('${aId}','${bId}','${pId}')">
      <span class="sep">=</span>
      <span class="pct-badge purple-p" id="${pId}">—</span>
      ${astHtml}
    </div>`;
  const rows=document.getElementById(`q${qi}-${key}-rows`);
  if(rows){
    const hint=rows.querySelector('.empty-hint');if(hint)hint.remove();
    rows.appendChild(div);
  }
}

function checkEmpty(containerId,key){
  const el=document.getElementById(containerId);
  if(!el)return;
  if(el.querySelectorAll('.pcard,.gcard').length===0){
    const hint=document.createElement('div');
    hint.className='empty-hint';
    hint.textContent='タップして選手を追加してください';
    el.appendChild(hint);
  }
}

function buildQPanel(qi){
  const q=`q${qi}`;
  const div=document.createElement('div');
  div.className='qpanel';div.id=`qpanel${qi}`;
  div.innerHTML=`
  <div class="section">
    <div class="section-head blue-h"><span class="section-dot blue-d"></span>クォータースコア</div>
    <div class="section-body">
      <div class="score-row">
        <input type="number" id="${q}-qs-a" inputmode="numeric" min="0" placeholder="自">
        <span class="score-dash">−</span>
        <input type="number" id="${q}-qs-b" inputmode="numeric" min="0" placeholder="相手">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head blue-h"><span class="section-dot blue-d"></span>チーム成績</div>
    <div class="section-body">
      ${statLine(q,'shot','ショット率','blue-p')}
      ${statLine(q,'at','ATセーブ率','blue-p')}
      ${statLine(q,'fs','フリシュー決定率','blue-p')}
    </div>
  </div>

  <div class="section">
    <div class="section-head teal-h"><span class="section-dot teal-d"></span>Gセーブ率</div>
    <div class="section-body">
      <div id="${q}-g-rows"><div class="empty-hint">タップして選手を追加してください</div></div>
      <button class="add-btn" onclick="addGoalie(${qi})">＋ ゴーリーを追加</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head amber-h"><span class="section-dot amber-d"></span>GBゲット率</div>
    <div class="section-body">
      ${statLine(q,'gb','全体','amber-p')}
      ${statLine(q,'gb2','自陣','amber-p')}
    </div>
  </div>

  <div class="section">
    <div class="section-head purple-h"><span class="section-dot purple-d"></span>個人ショット率</div>
    <div class="section-body">
      <div id="${q}-ps-rows"><div class="empty-hint">タップして選手を追加してください</div></div>
      <button class="add-btn" onclick="addPlayer(${qi},'ps',true)">＋ 選手を追加</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head coral-h"><span class="section-dot coral-d"></span>個人フリシュー決定率</div>
    <div class="section-body">
      <div id="${q}-pf-rows"><div class="empty-hint">タップして選手を追加してください</div></div>
      <button class="add-btn" onclick="addPlayer(${qi},'pf',false)">＋ 選手を追加</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head green-h"><span class="section-dot green-d"></span>ドローゲット率</div>
    <div class="section-body">
      <div id="${q}-dr-rows"><div class="empty-hint">タップして選手を追加してください</div></div>
      <button class="add-btn" onclick="addPlayer(${qi},'dr',false)">＋ 選手を追加</button>
      <hr class="hr" style="margin:10px 0">
      ${statLine(q,'dr2','全体','green-p')}
    </div>
  </div>

  <div class="section">
    <div class="section-head gray-h"><span class="section-dot gray-d"></span>OFポゼ</div>
    <div class="section-body">
      <div class="field">
        <div class="field-label">平均時間（ショットまで）</div>
        <div class="time-row">
          <input type="number" id="${q}-avg-m" inputmode="numeric" min="0" placeholder="0">
          <span class="time-colon">:</span>
          <input type="number" id="${q}-avg-s" inputmode="numeric" min="0" max="59" placeholder="00">
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <div class="field-label">合計時間</div>
        <div class="time-row">
          <input type="number" id="${q}-tot-m" inputmode="numeric" min="0" placeholder="0">
          <span class="time-colon">:</span>
          <input type="number" id="${q}-tot-s" inputmode="numeric" min="0" max="59" placeholder="00">
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('qpanels').appendChild(div);
}

[1,2,3,4].forEach(buildQPanel);

function gv(id){return document.getElementById(id)?.value||''}
function nv(id){return gv(id)||'0'}
function tf(m,s){return `${gv(m)||'0'}:${String(gv(s)||'0').padStart(2,'0')}`}

function fracOut(q,key){
  const a=nv(`${q}-${key}-a`),b=nv(`${q}-${key}-b`);
  if(parseFloat(a)===0&&parseFloat(b)===0)return '-/ -= -%';
  const p=pc(a,b);return `${a}/ ${b}= ${p===null?'—%':p+'%'}`;
}

function collectGoalies(qi){
  const base=`q${qi}-g`;
  return Array.from(document.querySelectorAll(`[id^="${base}-card"]`)).map(card=>{
    const idx=card.id.replace(`${base}-card`,'');
    const nm=gv(`${base}-n${idx}`)||'G名前';
    const a=nv(`${base}-a${idx}`),b=nv(`${base}-b${idx}`);
    const p=pc(a,b);
    const pStr=(parseFloat(a)===0&&parseFloat(b)===0)?'-/ -= -%':`${a}/ ${b}= ${p===null?'—%':p+'%'}`;
    return `${nm}　 ${pStr}`;
  }).join('\n');
}

function collectPlayers(qi,key,hasAst){
  const base=`q${qi}-${key}`;
  const cards=document.querySelectorAll(`[id^="${base}-card"]`);
  if(!cards.length)return '（なし）';
  return Array.from(cards).map(card=>{
    const idx=card.id.replace(`${base}-card`,'');
    const nm=gv(`${base}-n${idx}`)||'名前';
    const a=nv(`${base}-a${idx}`),b=nv(`${base}-b${idx}`);
    const p=pc(a,b);const pStr=p===null?'—%':p+'%';
    if(hasAst){const ast=nv(`${base}-ast${idx}`);return `${nm}　${a}/${b} = ${pStr}（アシスト ${ast} 本）`;}
    return `${nm}　${a}/ ${b}= ${pStr}`;
  }).join('\n');
}

function qOut(qi){
  const q=`q${qi}`,lb=['','1Q','2Q','3Q','4Q'];
  const goalies=collectGoalies(qi)||'（なし）';
  return `［${lb[qi]}］ ${nv(`${q}-qs-a`)}-${nv(`${q}-qs-b`)}
・ゴーリー
${goalies}
・ショット率　 ${fracOut(q,'shot')}
・ATセーブ率　 ${fracOut(q,'at')}
・フリシュー決定率　 ${fracOut(q,'fs')}
・Gセーブ率
${goalies}
・GBゲット率
　 ${fracOut(q,'gb')}
自陣　 ${fracOut(q,'gb2')}
・個人ショット率
${collectPlayers(qi,'ps',true)}

function generate(){
  const type=document.getElementById('match-type').value;
  const tl=type==='league'?`リーグ第${gv('lnum')||'◯'}戦`:'練習試合';
  const opp=gv('opponent')||'◯◯大学';
  const txt=`お疲れさまです。
本日の【${tl}】vs${opp}の試合データです。
データシート原本は後ほどドライブとslackにあげます。
よろしくお願いします。
スコア
${nv('ts-a')}-${nv('ts-b')}

${[1,2,3,4].map(qOut).join('\n\n')}`;
  document.getElementById('out-box').textContent=txt;
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal(e){if(e.target===document.getElementById('modal-bg'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-bg').classList.remove('show');}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out-box').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='コピーしました ✓';b.classList.add('ok');
    setTimeout(()=>{b.textContent='コピーする';b.classList.remove('ok');},2500);
  });
}
</script>
